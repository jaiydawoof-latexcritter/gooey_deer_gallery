<!-- LIGHTBOX -->
<div id="lightbox">
  <div class="lb-inner">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <div class="lb-img-wrap"><img id="lb-img" src="" alt=""></div>
    <div class="lb-meta"><h3 id="lb-title"></h3><p id="lb-sub"></p></div>
    <div class="lb-nav">
      <button class="lb-btn" onclick="navLightbox(-1)">← Prev</button>
      <button class="lb-btn" onclick="navLightbox(1)">Next →</button>
    </div>
  </div>
</div>
